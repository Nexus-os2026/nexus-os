[package]
name = "nexus-integration"
description = "Integration tests for Nexus OS cross-crate functionality"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[features]
tauri-runtime = []
real-claude = []

[lib]
path = "src/lib.rs"

[dependencies]
nexus-kernel = { path = "../../kernel" }
nexus-connectors-core = { path = "../../connectors/core" }
nexus-factory = { path = "../../factory" }
nexus-research = { path = "../../research" }
nexus-content = { path = "../../content" }
nexus-workflows = { path = "../../workflows" }
nexus-analytics = { path = "../../analytics" }
nexus-adaptation = { path = "../../adaptation" }
nexus-connectors-web = { path = "../../connectors/web" }
nexus-connectors-social = { path = "../../connectors/social" }
nexus-connectors-messaging = { path = "../../connectors/messaging" }
nexus-connectors-llm = { path = "../../connectors/llm", features = ["flash-infer"] }
nexus-protocols = { path = "../../protocols" }
coding-agent = { path = "../../agents/coding-agent" }
social-poster-agent = { path = "../../agents/social-poster" }
coder-agent = { path = "../../agents/coder" }
screen-poster-agent = { path = "../../agents/screen-poster" }
web-builder-agent = { path = "../../agents/web-builder" }
workflow-studio-agent = { path = "../../agents/workflow-studio" }
self-improve-agent = { path = "../../agents/self-improve" }
nexus-airgap = { path = "../../packaging/airgap" }
nexus-conductor = { path = "../../agents/conductor" }
nexus-sdk = { path = "../../sdk" }
nexus-distributed = { path = "../../distributed" }
nexus-enterprise = { path = "../../enterprise" }
nexus-marketplace = { path = "../../marketplace" }
nexus-cloud = { path = "../../cloud" }
nexus-collaboration = { path = "../../agents/collaboration" }
nexus-persistence = { path = "../../persistence" }
nexus-auth = { path = "../../auth" }
nexus-telemetry = { path = "../../telemetry" }
nexus-tenancy = { path = "../../tenancy" }
nexus-integrations = { path = "../../integrations" }
nexus-flash-infer = { path = "../../crates/nexus-flash-infer", features = ["download"] }
nexus-capability-measurement = { path = "../../crates/nexus-capability-measurement" }
nexus-governance-oracle = { path = "../../crates/nexus-governance-oracle" }
nexus-governance-engine = { path = "../../crates/nexus-governance-engine" }
nexus-governance-evolution = { path = "../../crates/nexus-governance-evolution" }
nexus-predictive-router = { path = "../../crates/nexus-predictive-router" }
nexus-browser-agent = { path = "../../crates/nexus-browser-agent" }
nexus-token-economy = { path = "../../crates/nexus-token-economy" }
nexus-computer-control = { path = "../../crates/nexus-computer-control" }
nexus-world-simulation = { path = "../../crates/nexus-world-simulation" }
nexus-perception = { path = "../../crates/nexus-perception" }
nexus-agent-memory = { path = "../../crates/nexus-agent-memory" }
nexus-external-tools = { path = "../../crates/nexus-external-tools" }
nexus-collab-protocol = { path = "../../crates/nexus-collab-protocol" }
nexus-software-factory = { path = "../../crates/nexus-software-factory" }
nexus-mcp = { path = "../../crates/nexus-mcp" }
nexus-a2a = { path = "../../crates/nexus-a2a" }
nexus-memory = { path = "../../crates/nexus-memory" }
nexus-migrate = { path = "../../crates/nexus-migrate" }
nexus-metering = { path = "../../metering" }
nexus-crypto = { path = "../../crates/nexus-crypto" }
nexus-desktop-backend = { path = "../../app/src-tauri", features = ["test-support"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.22"
toml = "0.8"
uuid = { version = "1.10", features = ["v4", "serde"] }
tempfile = "3.13"
sysinfo = "0.32"
rusqlite = { version = "0.31", features = ["bundled"] }
sha2 = "0.10"
chrono = "0.4"
tokio = { version = "1", features = ["rt", "sync", "time"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
urlencoding = "2"
open = "5"

[target.'cfg(target_os = "linux")'.dependencies]
tauri = { version = "2.5.5", default-features = false, features = ["tray-icon", "wry"] }
