[package]
name = "nexus-integration"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
nexus-kernel = { path = "../../kernel" }
nexus-factory = { path = "../../factory" }
nexus-research = { path = "../../research" }
nexus-content = { path = "../../content" }
nexus-workflows = { path = "../../workflows" }
nexus-analytics = { path = "../../analytics" }
nexus-adaptation = { path = "../../adaptation" }
nexus-connectors-web = { path = "../../connectors/web" }
nexus-connectors-llm = { path = "../../connectors/llm" }
coding-agent = { path = "../../agents/coding-agent" }
social-poster-agent = { path = "../../agents/social-poster" }
coder-agent = { path = "../../agents/coder" }
screen-poster-agent = { path = "../../agents/screen-poster" }
web-builder-agent = { path = "../../agents/web-builder" }
workflow-studio-agent = { path = "../../agents/workflow-studio" }
self-improve-agent = { path = "../../agents/self-improve" }
nexus-sdk = { path = "../../sdk" }
nexus-distributed = { path = "../../distributed" }
nexus-enterprise = { path = "../../enterprise" }
nexus-marketplace = { path = "../../marketplace" }
nexus-cloud = { path = "../../cloud" }
nexus-collaboration = { path = "../../agents/collaboration" }
ed25519-dalek = { version = "2", features = ["rand_core"] }
serde_json = "1.0"
uuid = { version = "1.10", features = ["v4", "serde"] }
tempfile = "3.13"
