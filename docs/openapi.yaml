        data:
          type: object
        timestamp:
          type: integer
          format: int64

    # Anthropic-compatible schemas

    AnthropicMessageRequest:
      type: object
      required: [model, max_tokens, messages]
      properties:
        model:
          type: string
          example: llama3
        max_tokens:
          type: integer
          example: 1024
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicChatMessage"
        system:
          type: string
          nullable: true
        stream:
          type: boolean
          default: false
        temperature:
          type: number
          format: float
          nullable: true
        top_p:
          type: number
          format: float
          nullable: true
        metadata:
          type: object
          nullable: true

    AnthropicChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/AnthropicContentBlock"

    AnthropicContentBlock:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string

    AnthropicMessageResponse:
      type: object
      properties:
        id:
          type: string
          example: msg_01XFDUDYJgAACzvnptvVoYEL
        type:
          type: string
          enum: [message]
        role:
          type: string
          enum: [assistant]
        content:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicContentBlock"
        model:
          type: string
        stop_reason:
          type: string
          nullable: true
          enum: [end_turn, max_tokens, stop_sequence]
        stop_sequence:
          type: string
          nullable: true
        usage:
          $ref: "#/components/schemas/AnthropicUsage"

    AnthropicUsage:
      type: object
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer

    AnthropicErrorResponse:
      type: object
      properties:
        type:
          type: string
          enum: [error]
        error:
          type: object
          properties:
            type:
              type: string
              enum: [invalid_request_error, authentication_error, permission_error, not_found_error, rate_limit_error, api_error, overloaded_error]
            message:
              type: string

    # OpenAI-compatible schemas

    OpenAiChatRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          example: llama3
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        max_tokens:
          type: integer
          nullable: true
        temperature:
          type: number
          format: float
          nullable: true
        stream:
          type: boolean
          default: false

    OpenAiChatResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          format: int64
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string
                enum: [stop, length]
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    OpenAiEmbeddingRequest:
      type: object
      required: [model, input]
      properties:
        model:
          type: string
          example: text-embedding-ada-002
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    OpenAiEmbeddingResponse:
      type: object
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            type: object
            properties:
              object:
                type: string
                enum: [embedding]
              index:
                type: integer
              embedding:
                type: array
                items:
                  type: number
        model:
          type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            total_tokens:
              type: integer

    OpenAiModelList:
      type: object
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              object:
                type: string
                enum: [model]
              created:
                type: integer
                format: int64
              owned_by:
                type: string
