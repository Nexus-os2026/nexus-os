[lib]
path = "src/lib.rs"

[dependencies]
aes-gcm = "0.10"
nexus-kernel = { path = "../../kernel" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.10", features = ["v4", "serde"] }
