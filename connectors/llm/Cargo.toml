[package]
name = "nexus-connectors-llm"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[features]
default = []
real-claude = []
real-api-tests = []
flash-infer = ["dep:nexus-flash-infer", "dep:nexus-llama-bridge"]
local-slm = [
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:tokenizers",
    "dep:hf-hub",
    "dep:safetensors",
]

[dependencies]
nexus-kernel = { path = "../../kernel" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
aes-gcm = "0.10"
hmac = "0.12"
tracing = "0.1"
uuid = { version = "1.10", features = ["v4", "serde"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }

# Local SLM dependencies (behind "local-slm" feature flag)
candle-core = { version = "0.8", optional = true }
candle-nn = { version = "0.8", optional = true }
candle-transformers = { version = "0.8", optional = true }
tokenizers = { version = "0.20", optional = true, default-features = false, features = ["onig"] }
hf-hub = { version = "0.3", optional = true }
safetensors = { version = "0.4", optional = true }

# Flash inference (behind "flash-infer" feature flag)
nexus-flash-infer = { path = "../../crates/nexus-flash-infer", features = ["real-llama"], optional = true }
nexus-llama-bridge = { path = "../../llama-bridge", features = ["real-llama"], optional = true }

[dev-dependencies]
nexus-sdk = { path = "../../sdk" }
