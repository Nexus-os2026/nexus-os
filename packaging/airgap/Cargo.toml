[package]
name = "nexus-airgap"
description = "Air-gapped deployment packaging for offline Nexus OS installations"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
uuid = { version = "1.10", features = ["v4"] }
