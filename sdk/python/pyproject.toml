[project]
name = "nexus-os-sdk"
version = "1.0.0"
description = "Python SDK for Nexus OS — Governed Deterministic Agent OS"
requires-python = ">=3.9"
dependencies = ["httpx>=0.25.0"]
license = {text = "MIT"}

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.setuptools.packages.find]
include = ["nexus_sdk*"]
