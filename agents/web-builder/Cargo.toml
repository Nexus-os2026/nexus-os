[package]
name = "web-builder-agent"
description = "Autonomous website and web application builder agent for Nexus OS"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
nexus-kernel = { path = "../../kernel" }
nexus-sdk = { path = "../../sdk" }
nexus-connectors-llm = { path = "../../connectors/llm" }
nexus-crypto = { path = "../../crates/nexus-crypto" }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
uuid = { version = "1.10", features = ["v4", "serde"] }
zip = { version = "1.1", default-features = false, features = ["deflate"] }
thiserror = "1.0"
indexmap = { version = "2.0", features = ["serde"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls"] }
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "time"] }
scraper = "0.22"
regex = "1.11"
ammonia = "4"
qrcode = "0.14"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }

[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", features = ["signal"] }
