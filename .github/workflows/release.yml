name: NexusOS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Build .deb package
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          bash scripts/build_linux_deb.sh "${GITHUB_REF_NAME#v}" amd64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-linux
          path: target/package/*

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Create .dmg package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUT_DIR="target/package/macos-dmg-root"
          mkdir -p "${OUT_DIR}"
          cp target/release/nexus-cli "${OUT_DIR}/nexus-cli"
          hdiutil create -volname "NexusOS" -srcfolder "${OUT_DIR}" -ov -format UDZO "target/package/nexus-os_${VERSION}_macos.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-macos
          path: target/package/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Install WiX toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Create .msi installer
        shell: pwsh
        run: |
          ./scripts/build_windows_msi.ps1 -Version "${env:GITHUB_REF_NAME}".TrimStart("v")

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-windows
          path: target/package/*

  build-desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build NexusOS desktop Linux bundles
        working-directory: app
        run: npm run dist:linux

      - name: Upload NexusOS desktop Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-desktop-linux
          path: app/src-tauri/target/release/bundle/**/*

  build-desktop-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build NexusOS desktop macOS bundle
        working-directory: app
        run: npm run dist:macos

      - name: Upload NexusOS desktop macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-desktop-macos
          path: app/src-tauri/target/release/bundle/**/*

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build NexusOS desktop Windows installers (.exe + .msi)
        working-directory: app
        shell: pwsh
        run: npm run dist:windows

      - name: Upload NexusOS desktop Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-desktop-windows
          path: app/src-tauri/target/release/bundle/**/*

  create-release:
    runs-on: ubuntu-latest
    needs:
      [
        build-linux,
        build-macos,
        build-windows,
        build-desktop-linux,
        build-desktop-macos,
        build-desktop-windows
      ]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
