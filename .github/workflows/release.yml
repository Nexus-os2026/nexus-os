name: NEXUS OS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build docs
        run: cargo doc --workspace --no-deps

  package-linux:
    name: Package Linux (.deb)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dpkg tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build Linux package
        run: bash scripts/build_linux_deb.sh "${GITHUB_REF_NAME#v}" amd64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-os-linux
          path: target/package/*

  package-macos:
    name: Package macOS (brew + launchd)
    runs-on: macos-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build macOS package assets
        run: bash scripts/build_macos_release.sh "${GITHUB_REF_NAME#v}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-os-macos
          path: target/package/*

  package-windows:
    name: Package Windows (MSI manifest)
    runs-on: windows-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows packaging assets
        shell: pwsh
        run: ./scripts/build_windows_msi.ps1 -Version "${env:GITHUB_REF_NAME}".TrimStart("v")

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-os-windows
          path: target/package/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [package-linux, package-macos, package-windows]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
