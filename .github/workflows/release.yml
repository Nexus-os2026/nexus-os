name: NexusOS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build Rust release
        run: cargo build --release

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri bundles
        working-directory: app
        run: npm run tauri build

      - name: Print bundle tree
        shell: pwsh
        run: |
          Write-Host "=== bundle tree ==="
          Get-ChildItem -Recurse app\src-tauri\target\release\bundle -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Discover and normalize Windows artifacts
        id: collect_artifacts
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v', ''
          $bundleRoot = "app/src-tauri/target/release/bundle"
          $found = Get-ChildItem $bundleRoot -Recurse -File -Include *.msi,*.exe,*.zip -ErrorAction SilentlyContinue | Sort-Object FullName
          if (-not $found -or $found.Count -eq 0) {
            throw "No Windows installer artifacts discovered under $bundleRoot"
          }

          New-Item -ItemType Directory -Path release-artifacts -Force | Out-Null
          $index = 1
          foreach ($file in $found) {
            $ext = $file.Extension.ToLowerInvariant()
            $dest = "release-artifacts/NexusOS_${version}_windows_x64_${index}${ext}"
            Copy-Item $file.FullName $dest -Force
            $index++
          }

          $normalized = Get-ChildItem release-artifacts -File | Sort-Object FullName | ForEach-Object { $_.FullName }
          "files<<EOF" >> $env:GITHUB_OUTPUT
          $normalized | ForEach-Object { $_ >> $env:GITHUB_OUTPUT }
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexusOS-Windows
          path: ${{ steps.collect_artifacts.outputs.files }}
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            pkg-config \
            build-essential

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build Rust release
        run: cargo build --release

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri bundles
        working-directory: app
        run: npm run tauri build

      - name: Print bundle tree
        shell: bash
        run: |
          echo "=== bundle tree ==="
          ls -R app/src-tauri/target/release/bundle || true

      - name: Discover and normalize Linux artifacts
        id: collect_artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          bundle_root="app/src-tauri/target/release/bundle"
          mapfile -t found < <(find "$bundle_root" -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.zip" -o -name "*.tar.gz" \) | sort)
          if [ "${#found[@]}" -eq 0 ]; then
            echo "No Linux installer artifacts discovered under $bundle_root" >&2
            exit 1
          fi

          mkdir -p release-artifacts
          idx=1
          for src in "${found[@]}"; do
            if [[ "$src" == *.tar.gz ]]; then
              ext=".tar.gz"
            else
              ext=".${src##*.}"
            fi
            dest="release-artifacts/NexusOS_${version}_linux_amd64_${idx}${ext}"
            cp "$src" "$dest"
            idx=$((idx + 1))
          done

          {
            echo "files<<EOF"
            find release-artifacts -maxdepth 1 -type f | sort
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexusOS-Linux
          path: ${{ steps.collect_artifacts.outputs.files }}
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build Rust release
        run: cargo build --release

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri bundles
        working-directory: app
        run: npm run tauri build

      - name: Print bundle tree
        shell: bash
        run: |
          echo "=== bundle tree ==="
          ls -R app/src-tauri/target/release/bundle || true

      - name: Discover and normalize macOS artifacts
        id: collect_artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          case "$(uname -m)" in
            x86_64) arch="x64" ;;
            arm64|aarch64) arch="aarch64" ;;
            *) arch="$(uname -m)" ;;
          esac

          bundle_root="app/src-tauri/target/release/bundle"
          mapfile -t found < <(find "$bundle_root" -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.zip" -o -name "*.tar.gz" \) | sort)
          if [ "${#found[@]}" -eq 0 ]; then
            echo "No macOS installer artifacts discovered under $bundle_root" >&2
            exit 1
          fi

          mkdir -p release-artifacts
          idx=1
          for src in "${found[@]}"; do
            if [[ "$src" == *.tar.gz ]]; then
              ext=".tar.gz"
            else
              ext=".${src##*.}"
            fi
            dest="release-artifacts/NexusOS_${version}_macos_${arch}_${idx}${ext}"
            cp "$src" "$dest"
            idx=$((idx + 1))
          done

          {
            echo "files<<EOF"
            find release-artifacts -maxdepth 1 -type f | sort
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexusOS-macOS
          path: ${{ steps.collect_artifacts.outputs.files }}
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Show downloaded artifacts
        run: find . -maxdepth 4 -type f | sort

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            NexusOS-Windows/*.msi
            NexusOS-Windows/*.exe
            NexusOS-Windows/*.zip
            NexusOS-Linux/*.deb
            NexusOS-Linux/*.AppImage
            NexusOS-Linux/*.zip
            NexusOS-Linux/*.tar.gz
            NexusOS-macOS/*.dmg
            NexusOS-macOS/*.zip
            NexusOS-macOS/*.tar.gz
