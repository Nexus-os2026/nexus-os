name: NexusOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
ci/windows-artifact-fix
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build Rust release
        run: cargo build --release

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri bundles (nsis preferred, msi fallback)
        shell: pwsh
        working-directory: app
        run: |
          npm run tauri build -- --bundles nsis
          if ($LASTEXITCODE -ne 0) {
            Write-Host "NSIS build failed, retrying MSI build..."
            npm run tauri build -- --bundles msi
            if ($LASTEXITCODE -ne 0) {
              throw "Tauri build failed for both NSIS and MSI bundle targets."
            }
          }

      - name: Print bundle tree (Windows)
        shell: pwsh
        run: |
          Write-Host "=== bundle tree ==="
          Get-ChildItem -Recurse target\release\bundle -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Discover and normalize Windows artifacts
        id: collect_windows
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v([0-9]+\.[0-9]+\.[0-9]+).*$','$1'
          $bundle = "target/release/bundle"
          $outDir = "release-artifacts"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          Write-Host "Listing bundle directory:"
          Get-ChildItem -Recurse $bundle -ErrorAction SilentlyContinue | Select-Object FullName

          $exe = Get-ChildItem $bundle -Recurse -Filter *.exe -ErrorAction SilentlyContinue |
            Sort-Object FullName |
            Select-Object -First 1
          $msi = Get-ChildItem $bundle -Recurse -Filter *.msi -ErrorAction SilentlyContinue |
            Sort-Object FullName |
            Select-Object -First 1

          if (-not $exe -and -not $msi) {
            Write-Error "No Windows installers found."
            Get-ChildItem -Recurse $bundle -ErrorAction SilentlyContinue | Select-Object FullName

      - run: cargo build --release
      - run: cd app && npm install && npm run tauri build
      - name: Print bundle tree (Windows)
        shell: pwsh
        run: |
          Write-Host "=== bundle tree ==="
          Get-ChildItem -Recurse target\release\bundle -ErrorAction SilentlyContinue | Select-Object FullName
      - name: Discover and normalize Windows artifacts
        shell: pwsh
        run: |
          $refName = "${env:GITHUB_REF_NAME}"
          if ($refName -match '^v([0-9]+\.[0-9]+\.[0-9]+)') {
            $version = $Matches[1]
          } else {
            $version = ($refName -replace '[^A-Za-z0-9._-]', '-')
          }
          $root = $env:GITHUB_WORKSPACE
          $bundleRoot = Join-Path $root "target\release\bundle"
          $stage = Join-Path $root "dist-release\windows"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          Write-Host "Listing bundle directory:"
          Get-ChildItem -Recurse $bundleRoot -ErrorAction SilentlyContinue | Select-Object FullName

          $files = Get-ChildItem -Path $bundleRoot -Recurse -File -Include *.exe,*.msi -ErrorAction SilentlyContinue
          if (-not $files -or $files.Count -eq 0) {
            $files = Get-ChildItem -Path $root -Recurse -File -Include *.exe,*.msi -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '\\target\\release\\bundle\\' }
          }

          $exe = $files | Where-Object { $_.Extension -ieq ".exe" } | Sort-Object FullName | Select-Object -First 1
          $msi = $files | Where-Object { $_.Extension -ieq ".msi" } | Sort-Object FullName | Select-Object -First 1

          Write-Host "Discovered artifacts:"
          $files | Sort-Object FullName | ForEach-Object { Write-Host $_.FullName }

          if (-not $exe -and -not $msi) {
            Write-Error "No Windows installers found under target/release/bundle."
            Get-ChildItem -Recurse $bundleRoot -ErrorAction SilentlyContinue | Select-Object FullName
            
            main
            exit 1
          }

          if ($exe) {
ci/windows-artifact-fix
            Copy-Item $exe.FullName "${outDir}/NexusOS_${version}_windows.exe" -Force
          }
          if ($msi) {
            Copy-Item $msi.FullName "${outDir}/NexusOS_${version}_windows.msi" -Force
          }

          $normalized = Get-ChildItem $outDir -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Extension -in ".exe", ".msi" } |
            Sort-Object FullName |
            ForEach-Object { $_.FullName }
          if (-not $normalized -or $normalized.Count -eq 0) {
            throw "Normalization produced no Windows artifacts."
          }
          "files<<EOF" >> $env:GITHUB_OUTPUT
          $normalized | ForEach-Object { $_ >> $env:GITHUB_OUTPUT }
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexusOS-Windows
          path: ${{ steps.collect_windows.outputs.files }}

            Copy-Item $exe.FullName (Join-Path $stage "NexusOS_${version}_windows_x64-setup.exe") -Force
          }
          if ($msi) {
            Copy-Item $msi.FullName (Join-Path $stage "NexusOS_${version}_windows_x64.msi") -Force
          }

          Write-Host "Normalized files:"
          Get-ChildItem -Path $stage -File | Select-Object FullName
      - uses: actions/upload-artifact@v4
        with:
          name: NexusOS-Windows
          path: |
            dist-release/windows/*.exe
            dist-release/windows/*.msi
 main
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            pkg-config \
            build-essential

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
ci/windows-artifact-fix
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build Rust release
        run: cargo build --release

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri bundles (deb)
        working-directory: app
        run: npm run tauri build -- --bundles deb

      - name: Print bundle tree (Linux)
        run: |
          pwd
          echo "=== bundle tree ==="
          ls -R target/release/bundle || true

      - name: Discover and normalize Linux artifacts
        id: collect_linux
        shell: bash
        run: |
          set -euo pipefail
          version="$(echo "${GITHUB_REF_NAME}" | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+).*$/\1/')"
          bundle_root="target/release/bundle"
          mkdir -p release-artifacts

          deb_file="$(find "${bundle_root}" -type f -name '*.deb' | LC_ALL=C sort | head -n 1)"
          if [ -z "${deb_file}" ]; then
            echo "No .deb produced. Check Tauri bundle targets." >&2
            ls -R "${bundle_root}" || true
            exit 1
          fi

          out="release-artifacts/nexus-os_${version}_amd64.deb"
          cp "${deb_file}" "${out}"

          {
            echo "files<<EOF"
            echo "${out}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexusOS-Linux
          path: ${{ steps.collect_linux.outputs.files }}

      - run: cargo build --release
      - run: cd app && npm install && npm run tauri build
      - name: Print bundle tree (Linux)
        run: |
          echo "=== bundle tree ==="
          ls -R target/release/bundle || true
      - name: Normalize Linux package name
        run: |
          VERSION="$(echo "${GITHUB_REF_NAME}" | sed -nE 's/^v([0-9]+\.[0-9]+\.[0-9]+).*$/\1/p')"
          if [ -z "${VERSION}" ]; then
            VERSION="$(echo "${GITHUB_REF_NAME}" | tr '/ ' '--' | tr -cd '[:alnum:]._-')"
          fi
          BUNDLE_ROOT="target/release/bundle"
          OUT_DIR="dist-release/linux"
          mkdir -p "${OUT_DIR}"
          DEB_FILE="$(find "${BUNDLE_ROOT}" -type f -name '*.deb' | LC_ALL=C sort | head -n 1)"
          if [ -z "${DEB_FILE}" ]; then
            echo "No .deb produced. Check Tauri bundle targets."
            ls -R "${BUNDLE_ROOT}" || true
            exit 1
          fi
          cp "${DEB_FILE}" "${OUT_DIR}/nexus-os_${VERSION}_amd64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: NexusOS-Linux
          path: dist-release/linux/nexus-os_*_amd64.deb
 main
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
ci/windows-artifact-fix
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build Rust release
        run: cargo build --release

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri bundles (dmg)
        working-directory: app
        run: npm run tauri build -- --bundles dmg

      - name: Print bundle tree (macOS)
        run: |
          pwd
          echo "=== bundle tree ==="
          ls -R target/release/bundle || true

      - name: Discover and normalize macOS artifacts
        id: collect_macos
        shell: bash
        run: |
          set -euo pipefail
          version="$(echo "${GITHUB_REF_NAME}" | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+).*$/\1/')"
          bundle_root="target/release/bundle"
          mkdir -p release-artifacts

          dmg_file="$(find "${bundle_root}" -type f -name '*.dmg' | LC_ALL=C sort | head -n 1)"
          if [ -z "${dmg_file}" ]; then
            echo "No .dmg produced. Check Tauri bundle targets." >&2
            ls -R "${bundle_root}" || true
            exit 1
          fi

          out="release-artifacts/NexusOS_${version}_universal.dmg"
          cp "${dmg_file}" "${out}"

          {
            echo "files<<EOF"
            echo "${out}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexusOS-macOS
          path: ${{ steps.collect_macos.outputs.files }}

      - run: cargo build --release
      - run: cd app && npm install && npm run tauri build
      - name: Print bundle tree (macOS)
        run: |
          echo "=== bundle tree ==="
          ls -R target/release/bundle || true
      - name: Normalize macOS package name
        run: |
          VERSION="$(echo "${GITHUB_REF_NAME}" | sed -nE 's/^v([0-9]+\.[0-9]+\.[0-9]+).*$/\1/p')"
          if [ -z "${VERSION}" ]; then
            VERSION="$(echo "${GITHUB_REF_NAME}" | tr '/ ' '--' | tr -cd '[:alnum:]._-')"
          fi
          BUNDLE_ROOT="target/release/bundle"
          OUT_DIR="dist-release/macos"
          mkdir -p "${OUT_DIR}"
          DMG_FILE="$(find "${BUNDLE_ROOT}" -type f -name '*.dmg' | LC_ALL=C sort | head -n 1)"
          if [ -z "${DMG_FILE}" ]; then
            echo "No .dmg produced. Check Tauri bundle targets."
            ls -R "${BUNDLE_ROOT}" || true
            exit 1
          fi
          cp "${DMG_FILE}" "${OUT_DIR}/NexusOS_${VERSION}_aarch64.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: NexusOS-macOS
          path: dist-release/macos/NexusOS_*_aarch64.dmg
main
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Show downloaded artifacts
        run: |
          pwd
          ls -R

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            NexusOS-Windows/*.msi
            NexusOS-Windows/*.exe
            NexusOS-Linux/*.deb
            NexusOS-macOS/*.dmg
          body: |
            ## NexusOS ${{ github.ref_name }}

            **The AI agent OS that proves what it did.**

            ### Downloads
            - **Windows**: `NexusOS_<version>_x64-setup.exe` or `NexusOS_<version>_x64.msi`
            - **macOS**: `NexusOS_<version>_universal.dmg`
            - **Linux**: `nexus-os_<version>_amd64.deb`
