name: NexusOS Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cargo build --release
      - run: cd app && npm install && npm run tauri build
      - name: Normalize Windows installer name
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v([0-9]+\.[0-9]+\.[0-9]+).*$','$1'
          $exe = Get-ChildItem "app/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $exe) { throw "NSIS installer not found" }
          Copy-Item $exe.FullName "app/src-tauri/target/release/bundle/nsis/NexusOS_${version}_x64-setup.exe" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: NexusOS-Windows
          path: app/src-tauri/target/release/bundle/nsis/NexusOS_*_x64-setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev
      - run: cargo build --release
      - run: cd app && npm install && npm run tauri build
      - name: Normalize Linux package name
        run: |
          VERSION="$(echo "${GITHUB_REF_NAME}" | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+).*$/\1/')"
          DEB_FILE="$(ls app/src-tauri/target/release/bundle/deb/*.deb | head -n 1)"
          cp "${DEB_FILE}" "app/src-tauri/target/release/bundle/deb/nexus-os_${VERSION}_amd64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: NexusOS-Linux
          path: app/src-tauri/target/release/bundle/deb/nexus-os_*_amd64.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cargo build --release
      - run: cd app && npm install && npm run tauri build
      - name: Normalize macOS package name
        run: |
          VERSION="$(echo "${GITHUB_REF_NAME}" | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+).*$/\1/')"
          DMG_FILE="$(ls app/src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)"
          cp "${DMG_FILE}" "app/src-tauri/target/release/bundle/dmg/NexusOS_${VERSION}_aarch64.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: NexusOS-macOS
          path: app/src-tauri/target/release/bundle/dmg/NexusOS_*_aarch64.dmg

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            NexusOS-Windows/*.exe
            NexusOS-Linux/*.deb
            NexusOS-macOS/*.dmg
          body: |
            ## NexusOS v1.0.0

            **The AI agent OS that proves what it did.**

            ### Downloads
            - **Windows**: NexusOS_1.0.0_x64-setup.exe
            - **macOS**: NexusOS_1.0.0_aarch64.dmg
            - **Linux**: nexus-os_1.0.0_amd64.deb
