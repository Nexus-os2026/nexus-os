name: NEXUS OS Security Audit

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit (pinned CVSS4-capable revision)
        run: cargo install --git https://github.com/RustSec/rustsec.git --rev 7e8ce5c6933a81c6aa8459f69615069f8cf766f4 cargo-audit --locked --force

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --force

      - name: Print tool versions
        run: |
          rustc -V
          cargo -V
          cargo audit -V
          cargo deny -V

      - name: Run cargo audit
        run: cargo audit

      - name: Run cargo deny check
        run: cargo deny check --config .github/deny.toml
