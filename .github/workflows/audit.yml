name: NEXUS OS Security Audit

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            glib-2.0 \
            pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit (pinned)
        run: cargo install cargo-audit --version 0.22.0 --locked --force

      - name: Install cargo-deny (pinned)
        run: cargo install cargo-deny --version 0.19.0 --locked --force

      - name: Refresh advisory caches
        run: |
          rm -rf ~/.cargo/advisory-db
          rm -rf ~/.cargo/advisory-dbs

      - name: Print tool versions
        run: |
          rustc -V
          cargo -V
          cargo audit -V
          cargo deny -V

      - name: Run cargo audit
        run: cargo audit

      - name: Run cargo deny check
        run: cargo deny check --config .github/deny.toml -W unlicensed
