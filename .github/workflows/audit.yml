name: NEXUS OS Security Audit

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit (pinned)
        run: cargo install cargo-audit --version 0.21.1 --locked --force

      - name: Install cargo-deny (pinned)
        run: |
          cargo install cargo-deny --version 0.14.24 --locked --force
          cargo deny -V
          which cargo-deny || true

      - name: Run cargo audit
        run: cargo audit

      - name: Run cargo deny check
        run: cargo deny check --config .github/deny.toml
