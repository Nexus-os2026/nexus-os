[graph]
all-features = true

[advisories]
# cargo-deny >= 0.19 uses scope values for informational advisories.
unmaintained = "workspace"
yanked = "warn"
ignore = []

[licenses]
# Workspace crates still use placeholder SPDX values, so CI downgrades
# unlicensed findings to warnings via: cargo deny ... -W unlicensed
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "OpenSSL",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib"
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
