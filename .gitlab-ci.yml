stages:
  - security
  - test
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

variables:
  CARGO_BUILD_JOBS: "2"
  CARGO_PROFILE_DEV_DEBUG: "1"

# ---------------------------------------------------------------------------
# Security stage — gating on main and MRs
# ---------------------------------------------------------------------------

cargo-audit:
  stage: security
  timeout: 10 minutes
  allow_failure: false
  before_script:
    - cargo install cargo-audit --locked 2>/dev/null || true
  script:
    - cargo audit --ignore RUSTSEC-2026-0044 --ignore RUSTSEC-2026-0048 --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0049 --ignore RUSTSEC-2026-0067 --ignore RUSTSEC-2026-0068
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

cargo-deny:
  stage: security
  timeout: 10 minutes
  allow_failure: false
  before_script:
    - cargo install cargo-deny --locked 2>/dev/null || true
  script:
    - cargo deny check
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# Test stage — runs on every pipeline
# ---------------------------------------------------------------------------

.rust-base:
  stage: test
  variables:
    CARGO_INCREMENTAL: "1"
    RUSTC_WRAPPER: ""
    RUSTFLAGS: "-C debuginfo=1"
  before_script:
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup component add rustfmt clippy
    - rustup target add wasm32-wasip1

rust-lint:
  extends: .rust-base
  timeout: 15 minutes
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings -A unexpected_cfgs

rust-tests-core:
  extends: .rust-base
  timeout: 30 minutes
  script:
    - cargo test -p nexus-kernel -p nexus-sdk -p nexus-cli

rust-tests-full:
  extends: .rust-base
  timeout: 30 minutes
  script:
    - cargo test --workspace --exclude nexus-kernel --exclude nexus-sdk --exclude nexus-cli --exclude nexus-integration

frontend-tests:
  stage: test
  timeout: 15 minutes
  script:
    - cd app
    - npm ci
    - npm test
    - npm run build
  artifacts:
    paths:
      - app/dist/
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Deploy stage — automated release on tags, manual build
# ---------------------------------------------------------------------------

release:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG"

release-build:
  stage: deploy
  timeout: 45 minutes
  variables:
    CARGO_INCREMENTAL: "0"
    RUSTFLAGS: "-C debuginfo=0"
  script:
    - cargo build --release -p nexus-cli
  artifacts:
    paths:
      - target/release/nexus-cli
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
      when: manual

# ---------------------------------------------------------------------------
# Nightly stage — runs #[ignore]d tests that need API keys or are long-running.
# Trigger: GitLab scheduled pipeline (set schedule in CI/CD > Schedules).
# Required CI/CD variables: GROQ_API_KEY, OPENROUTER_API_KEY
# ---------------------------------------------------------------------------

nightly-api-key-tests:
  extends: .rust-base
  stage: test
  timeout: 30 minutes
  script:
    - cargo test -p nexus-capability-measurement -- --ignored --nocapture
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

nightly-long-running-tests:
  extends: .rust-base
  stage: test
  timeout: 45 minutes
  script:
    - cargo test -p nexus-capability-measurement -- execute_run1 execute_run2 --ignored --nocapture
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
