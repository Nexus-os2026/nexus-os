stages:
  - security
  - test
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

variables:
  CARGO_BUILD_JOBS: "2"
  CARGO_PROFILE_DEV_DEBUG: "1"

# ---------------------------------------------------------------------------
# Security stage — gating on main and MRs
# ---------------------------------------------------------------------------

cargo-audit:
  stage: security
  timeout: 10 minutes
  allow_failure: false
  before_script:
    - cargo install cargo-audit --locked 2>/dev/null || true
  script:
    - cargo audit --config audit.toml
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

cargo-deny:
  stage: security
  timeout: 10 minutes
  allow_failure: false
  before_script:
    - cargo install cargo-deny --locked 2>/dev/null || true
  script:
    - cargo deny check
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# Test stage — runs on every pipeline
# ---------------------------------------------------------------------------

.rust-base:
  stage: test
  variables:
    CARGO_INCREMENTAL: "1"
    RUSTC_WRAPPER: ""
    RUSTFLAGS: "-C debuginfo=1"
  before_script:
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup component add rustfmt clippy
    - rustup target add wasm32-wasip1

rust-lint:
  extends: .rust-base
  timeout: 15 minutes
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings -A unexpected_cfgs

rust-tests-core:
  extends: .rust-base
  timeout: 30 minutes
  script:
    - cargo test -p nexus-kernel -p nexus-sdk -p nexus-cli

rust-tests-full:
  extends: .rust-base
  timeout: 30 minutes
  script:
    - cargo test --workspace --exclude nexus-kernel --exclude nexus-sdk --exclude nexus-cli --exclude nexus-integration

frontend-tests:
  stage: test
  timeout: 15 minutes
  script:
    - cd app
    - npm ci
    - npm run build
  artifacts:
    paths:
      - app/dist/
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Deploy stage — automated release on tags, manual build
# ---------------------------------------------------------------------------

release:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG — see CHANGELOG.md for details"
    assets:
      links: []

release-build:
  stage: deploy
  timeout: 45 minutes
  variables:
    CARGO_INCREMENTAL: "0"
    RUSTFLAGS: "-C debuginfo=0"
  script:
    - cargo build --release -p nexus-cli
  artifacts:
    paths:
      - target/release/nexus-cli
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
      when: manual
