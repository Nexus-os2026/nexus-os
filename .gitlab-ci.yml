stages:
  - security
  - test

cargo-audit:
  stage: security
  image: rust:latest
  before_script:
    - cargo install cargo-audit
  script:
    - cargo audit --config audit.toml

cargo-deny:
  stage: security
  image: rust:latest
  before_script:
    - cargo install cargo-deny
  script:
    - cargo deny check

rust-tests:
  stage: test
  image: rust:latest
  variables:
    CARGO_BUILD_JOBS: "2"
    RUSTFLAGS: "-C debuginfo=1"
  before_script:
    - apt-get update && apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev pkg-config
    - rustup component add rustfmt clippy
    - rustup target add wasm32-wasip1
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings
    - cargo test --workspace

frontend-tests:
  stage: test
  image: node:22
  script:
    - cd app
    - npm ci
    - npm run build
