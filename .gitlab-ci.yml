workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"

stages:
  - security
  - test

cargo-audit:
  stage: security
  image: rust:latest
  allow_failure: true
  before_script:
    - cargo install cargo-audit --locked
  script:
    - cargo audit
        --ignore RUSTSEC-2025-0046
        --ignore RUSTSEC-2025-0118
        --ignore RUSTSEC-2026-0020
        --ignore RUSTSEC-2026-0021
        --ignore RUSTSEC-2026-0037

cargo-deny:
  stage: security
  image: rust:latest
  allow_failure: true
  before_script:
    - cargo install cargo-deny --locked
  script:
    - cargo deny check -W unlicensed

rust-tests:
  stage: test
  image: rust:latest
  before_script:
    - apt-get update && apt-get install -y
        libgtk-3-dev
        libwebkit2gtk-4.1-dev
        libayatana-appindicator3-dev
        librsvg2-dev
        libssl-dev
        pkg-config
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings
    - cargo test --workspace

frontend-tests:
  stage: test
  image: node:22
  script:
    - cd app
    - npm ci
    - npm run build
