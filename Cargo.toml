[workspace]
resolver = "2"
members = [
    "crates/nexus-core",
    "crates/nexus-agent",
    "crates/nexus-audit",
    "crates/nexus-voice",
    "crates/nexus-bridge",
    "app",
]

[workspace.dependencies]
tokio = { version = "1.40", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
thiserror = "1.0"
anyhow = "1.0"
uuid = { version = "1.10", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
aes-gcm = "0.10"
toml = "0.8"
