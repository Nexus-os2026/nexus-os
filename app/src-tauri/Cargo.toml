[package]
name = "nexus-desktop-backend"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["tauri-runtime"]
tauri-runtime = ["dep:tauri"]
real-claude = []

[dependencies]
nexus-kernel = { path = "../../kernel" }
nexus-connectors-core = { path = "../../connectors/core" }
nexus-connectors-web = { path = "../../connectors/web" }
nexus-connectors-social = { path = "../../connectors/social" }
nexus-connectors-messaging = { path = "../../connectors/messaging" }
nexus-connectors-llm = { path = "../../connectors/llm" }
nexus-adaptation = { path = "../../adaptation" }
nexus-protocols = { path = "../../protocols" }
nexus-distributed = { path = "../../distributed" }
nexus-factory = { path = "../../factory" }
nexus-marketplace = { path = "../../marketplace" }
nexus-sdk = { path = "../../sdk" }
nexus-airgap = { path = "../../packaging/airgap" }
nexus-conductor = { path = "../../agents/conductor" }
nexus-enterprise = { path = "../../enterprise" }
nexus-persistence = { path = "../../persistence" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.22"
toml = "0.8"
uuid = { version = "1.10", features = ["v4", "serde"] }
sysinfo = "0.32"
rusqlite = { version = "0.31", features = ["bundled"] }
sha2 = "0.10"
chrono = "0.4"
ed25519-dalek = "2"
tokio = { version = "1", features = ["rt", "sync", "time"] }

[target.'cfg(any(target_os = "windows", target_os = "macos"))'.dependencies]
tauri = { version = "2.5.5", optional = true, default-features = false, features = ["tray-icon", "wry"] }
tauri-plugin-global-shortcut = "2.3.1"

[target.'cfg(target_os = "linux")'.dependencies]
tauri = { version = "2.5.5", optional = true, default-features = false, features = ["tray-icon", "wry"] }
tauri-plugin-global-shortcut = "2.3.1"

[build-dependencies]
tauri-build = { version = "2.5.5" }
