[package]
name = "nexus-cli"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
nexus-kernel = { path = "../kernel" }
nexus-connectors-core = { path = "../connectors/core" }

[dev-dependencies]
uuid = { version = "1.10", features = ["v4"] }
