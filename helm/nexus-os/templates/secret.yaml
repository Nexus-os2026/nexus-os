{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nexus-os.fullname" . }}
  labels:
    {{- include "nexus-os.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.auth.jwtSecret | b64enc | quote }}
  {{- if and (eq .Values.database.backend "postgres") (not .Values.database.existingSecret) }}
  database-url: {{ .Values.database.postgresUrl | b64enc | quote }}
  {{- end }}
{{- end }}
