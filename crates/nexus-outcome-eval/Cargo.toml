[package]
name = "nexus-outcome-eval"
version = "0.1.0"
license = "MIT"
edition = "2021"
description = "Outcome evaluation primitives — compliance-ready goal verification for governed AI agents"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.10", features = ["v4", "serde"] }
sha2 = "0.10"
hex = "0.4"
regex = "1.11"
thiserror = "2"
tracing = "0.1"
