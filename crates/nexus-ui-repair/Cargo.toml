[package]
name = "nexus-ui-repair"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Autonomous QA scout for the Nexus OS UI (Phase 1.1 skeleton). See docs/roadmaps/NEXUS_UI_REPAIR_v1.1_scout_repair_split.md."

[dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand = "0.8"
sha2 = "0.10"
tracing = "0.1"
scraper = { workspace = true }
regex = { workspace = true }
nexus-computer-use = { path = "../nexus-computer-use" }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "process", "io-util", "fs", "sync", "time"] }
chrono = { version = "0.4.44", default-features = false, features = ["clock", "serde"] }
async-trait = "0.1"
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tempfile = "3"
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "nexus-ui-repair"
path = "src/bin/nexus_ui_repair.rs"
