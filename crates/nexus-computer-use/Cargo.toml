[package]
name = "nexus-computer-use"
version = "0.1.0"
edition = "2021"
description = "Governed computer use capabilities for Nexus Code"

[[bin]]
name = "nx-screen"
path = "src/bin/screen_test.rs"

[[bin]]
name = "nx-input"
path = "src/bin/input_test.rs"

[[bin]]
name = "nx-agent"
path = "src/bin/agent_test.rs"

[[bin]]
name = "nx-govern"
path = "src/bin/governance_test.rs"

[[bin]]
name = "nx-learn"
path = "src/bin/learn_test.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
sha2 = "0.10"
hex = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tempfile = "3"
image = "0.25"
base64 = "0.22"
thiserror = "2"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
