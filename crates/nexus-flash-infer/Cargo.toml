[package]
name = "nexus-flash-infer"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Universal flash inference engine with memory-budgeted orchestration"

[features]
default = []
real-llama = ["nexus-llama-bridge/real-llama"]
download = ["reqwest", "futures-util", "sha2"]

[dependencies]
nexus-llama-bridge = { path = "../../llama-bridge" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "time", "rt", "fs", "io-util"] }
tracing = "0.1"
thiserror = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }

# download feature deps (optional)
reqwest = { version = "0.12", default-features = false, features = ["stream", "rustls-tls"], optional = true }
futures-util = { version = "0.3", optional = true }
sha2 = { version = "0.10", optional = true }

[lints]
workspace = true
