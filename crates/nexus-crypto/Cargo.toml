[package]
name = "nexus-crypto"
version = "0.1.0"
edition = "2021"
description = "Crypto-agility layer for Nexus OS — pluggable signature and key exchange algorithms"

[dependencies]
ed25519-dalek = { version = "2.2", features = ["serde", "rand_core"] }
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
rand = "0.8"
