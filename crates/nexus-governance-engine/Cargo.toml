[package]
name = "nexus-governance-engine"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Governance Decision Engine — isolated policy evaluation with hash-chained audit log."

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.10", features = ["v4"] }
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["sync"] }
nexus-governance-oracle = { path = "../nexus-governance-oracle" }

[lints]
workspace = true
