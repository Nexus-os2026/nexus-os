[package]
name = "nexus-self-improve"
version = "10.5.0"
edition = "2021"
license = "MIT"
description = "Governed self-improvement engine for Nexus OS — the capstone kernel-level system that allows agents to improve themselves while governance remains immutable"

[dependencies]
uuid = { version = "1.10", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "time"] }
proptest = "1.4"
