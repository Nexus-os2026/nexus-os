[package]
name = "nexus-governance-oracle"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Governance Oracle — sealed submission interface for agent capability requests with timing normalization and cryptographic commitment."

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.10", features = ["v4", "serde"] }
sha2 = "0.10"
nexus-crypto = { path = "../nexus-crypto" }
rand = "0.8"
thiserror = "2"
tokio = { version = "1", features = ["sync", "time", "rt", "macros"] }

[lints]
workspace = true
