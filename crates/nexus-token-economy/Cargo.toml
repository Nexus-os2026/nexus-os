[package]
name = "nexus-token-economy"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
sha2 = "0.10"
ed25519-dalek = { version = "2", features = ["serde"] }
rand = "0.8"
thiserror = "1"
tracing = "0.1"
