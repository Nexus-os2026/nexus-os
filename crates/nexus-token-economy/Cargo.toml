[package]
name = "nexus-token-economy"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "NexusCoin token economy — wallets, burn, delegation, escrow, pricing"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
sha2 = "0.10"
nexus-crypto = { path = "../nexus-crypto" }
rand = "0.8"
thiserror = "1"
tracing = "0.1"
