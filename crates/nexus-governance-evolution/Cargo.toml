[package]
name = "nexus-governance-evolution"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Adversarial governance evolution — synthetic attacks, threat model absorption, and rule mutation."

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.10", features = ["v4"] }
sha2 = "0.10"
rand = "0.8"
thiserror = "2"
tokio = { version = "1", features = ["sync", "time"] }
nexus-governance-oracle = { path = "../nexus-governance-oracle" }
nexus-governance-engine = { path = "../nexus-governance-engine" }

[dev-dependencies]
nexus-crypto = { path = "../nexus-crypto" }

[lints]
workspace = true
