[package]
name = "nexus-agent-memory"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Agent memory store with consolidation, indexing, and governance"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
sha2 = "0.10"
thiserror = "1"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
