[package]
name = "nexus-migrate"
version = "0.1.0"
license = "MIT"
edition = "2021"
description = "Migration tool for importing agents from CrewAI and LangGraph into Nexus OS"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.10", features = ["v4", "serde"] }
tracing = "0.1"
thiserror = "2"
regex = "1.11"
