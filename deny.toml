[graph]
all-features = true

[advisories]
unmaintained = "workspace"
yanked = "warn"
ignore = [
  # wasmtime v27 — upgrade tracked separately
  "RUSTSEC-2025-0046",
  "RUSTSEC-2025-0118",
  "RUSTSEC-2026-0020",
  "RUSTSEC-2026-0021",
  # quinn-proto 0.11.13 DoS — reqwest transitive dep, upgrade tracked separately
  "RUSTSEC-2026-0037",
]

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
